<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WC 2022 · Contact</title>

    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <!-- ===== HEADER ===== -->
      <header class="header">
        <div class="logo">
          <i class="fas fa-trophy"></i>
          <h1>WC 2022</h1>
          <span>Qatar</span>
        </div>
        <nav class="nav-links">
          <a href="index.html"><i class="fas fa-futbol"></i> Home</a>
          <a href="matches.html"
            ><i class="fas fa-calendar-check"></i> Matches</a
          >
          <a href="stats.html"><i class="fas fa-chart-simple"></i> Stats</a>
          <a href="groups.html"><i class="fas fa-layer-group"></i> Groups</a>
          <a href="contact.html" class="active"
            ><i class="fas fa-envelope"></i> Contact</a
          >
        </nav>
      </header>

      <!-- ===== CONTACT ===== -->
      <section>
        <h2 class="page-title">
          <i
            class="fas fa-envelope"
            style="color: #d4af37; margin-right: 12px"
          ></i>
          Contact us
        </h2>
        <div class="contact-info">
          <div style="display: flex; flex-wrap: wrap; gap: 2rem 3rem">
            <div>
              <i class="fas fa-map-pin"></i> <strong>Headquarters</strong><br />
              Doha, Qatar
            </div>
            <div>
              <i class="fas fa-phone-alt"></i> <strong>Hotline</strong><br />
              +974 555-WC22
            </div>
            <div>
              <i class="fas fa-envelope"></i> <strong>Email</strong><br />
              info@fifawc2022.com
            </div>
            <div>
              <i class="fas fa-share-alt"></i> <strong>Social</strong><br />
              @FIFAWorldCup
            </div>
          </div>
          <hr style="border-color: #d4af3730; margin: 1.5rem 0" />
          <p>
            <i class="fas fa-paper-plane" style="color: #d4af37"></i> For media,
            ticketing or partnerships — reach out anytime.
          </p>
          <p style="margin-top: 1rem">
            <span class="btn"
              ><i class="fas fa-comment"></i> Send a message</span
            >
          </p>
        </div>
      </section>

      <footer>
        <i class="fas fa-futbol" style="color: #d4af37; margin-right: 8px"></i>
        FIFA World Cup 2022 · Dark sport theme
      </footer>
    </div>
  </body>
</html>
